{% extends "base.html" %}
{% block title %}Delete Project — StandarCloud{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger">
      <div class="card-body p-4">
        <h5 class="card-title text-danger">Delete Project</h5>
        <p>Are you sure you want to delete <strong>{{ project.name }}</strong>? This will also remove all associated assets.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a href="{% url 'projects:detail' project.slug %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
